<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Model Evaluation Report</title>
  <style>
    body { font-family: Arial, sans-serif; background: #0f172a; color: #e2e8f0; margin: 24px; }
    .card { background: #111827; border: 1px solid #334155; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #475569; padding: 10px; text-align: left; }
    th { background: #1e293b; }
    img { max-width: 100%; border-radius: 10px; border: 1px solid #334155; }
  </style>
</head>
<body>
  <h1>Model Evaluation Report</h1>
  <div class="card">
    <h2>Metric table</h2>
    <table border="1" class="dataframe table">
  <thead>
    <tr style="text-align: right;">
      <th></th>
      <th>accuracy</th>
      <th>precision</th>
      <th>recall</th>
      <th>specificity</th>
      <th>f1_score</th>
      <th>error_rate</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <th>model</th>
      <td>0.85</td>
      <td>0.0</td>
      <td>0.0</td>
      <td>1.0</td>
      <td>0.0</td>
      <td>0.15</td>
    </tr>
  </tbody>
</table>
  </div>
  <div class="card">
    <h2>Metric bar chart</h2>
    <svg width="500" height="280" viewBox="0 0 500 280" xmlns="http://www.w3.org/2000/svg">
      <line x1="50" y1="220" x2="470" y2="220" stroke="#94a3b8" />
      <line x1="50" y1="30" x2="50" y2="220" stroke="#94a3b8" />
      <rect x="50" y="58.5" width="50" height="161.5" fill="#2563eb" rx="6" />
<text x="75.0" y="260" text-anchor="middle" font-size="11">accuracy</text><rect x="125" y="220.0" width="50" height="8" fill="#10b981" rx="6" />
<text x="150.0" y="260" text-anchor="middle" font-size="11">precision</text><rect x="200" y="220.0" width="50" height="8" fill="#f59e0b" rx="6" />
<text x="225.0" y="260" text-anchor="middle" font-size="11">recall</text><rect x="275" y="30.0" width="50" height="190.0" fill="#8b5cf6" rx="6" />
<text x="300.0" y="260" text-anchor="middle" font-size="11">specificity</text><rect x="350" y="220.0" width="50" height="8" fill="#ef4444" rx="6" />
<text x="375.0" y="260" text-anchor="middle" font-size="11">f1_score</text><rect x="425" y="191.5" width="50" height="28.500000000000004" fill="#64748b" rx="6" />
<text x="450.0" y="260" text-anchor="middle" font-size="11">error_rate</text>
    </svg>
  </div>
  <div class="card">
    <h2>Summary chart</h2>
    <img src="evaluation_summary.png" alt="Evaluation summary chart" />
  </div>
</body>
</html>
