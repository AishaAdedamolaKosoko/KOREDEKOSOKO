<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="description" content="AI-powered NDT defect detection for composite materials" />
    <title>Composite NDT Defect Detector</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        slate: {
                            850: '#1e293b',
                            900: '#0f172a',
                            950: '#020617',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0f172a; color: #e2e8f0; }
        .gradient-text {
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .card {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(100, 116, 139, 0.3);
        }
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.4);
        }
        .gauge-container {
            position: relative;
            width: 200px;
            height: 120px;
        }
        .gauge-arc {
            width: 200px;
            height: 100px;
            border-radius: 100px 100px 0 0;
            background: conic-gradient(from 180deg, #ef4444 0deg, #f59e0b 60deg, #22c55e 120deg, #22c55e 180deg);
            position: relative;
            overflow: hidden;
        }
        .gauge-inner {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 140px;
            height: 70px;
            background: #1e293b;
            border-radius: 70px 70px 0 0;
        }
        .gauge-needle {
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 4px;
            height: 90px;
            background: white;
            transform-origin: bottom center;
            border-radius: 2px;
            transition: transform 1s ease;
        }
        .gauge-center {
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 16px;
            height: 16px;
            background: white;
            border-radius: 50%;
        }
        .progress-bar {
            height: 8px;
            border-radius: 4px;
            background: rgba(100, 116, 139, 0.3);
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 1s ease;
        }
        .dropzone {
            border: 2px dashed #475569;
            border-radius: 12px;
            transition: all 0.3s ease;
        }
        .dropzone:hover, .dropzone.dragover {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.05);
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .animate-pulse-slow {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        .tab-btn {
            padding: 12px 24px;
            border-radius: 8px;
            transition: all 0.3s;
            cursor: pointer;
        }
        .tab-btn.active {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
            border-bottom: 2px solid #3b82f6;
        }
        .tab-btn:hover:not(.active) {
            background: rgba(100, 116, 139, 0.2);
        }
    </style>
</head>
<body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
</body>
</html>
